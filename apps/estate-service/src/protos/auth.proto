syntax = "proto3";

package auth;


service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUsersByRole(GetUsersByRoleRequest) returns (GetUsersByRoleResponse);
}

message GetUsersByRoleRequest {
  string role = 1;
}

message UserItem {
  string id = 1;
  string role = 2;
  string full_name = 3;
  string email = 4;
}

message GetUsersByRoleResponse {
  repeated UserItem users = 1;
}

message ValidateTokenRequest {
  string token = 1; 
}

message ValidateTokenResponse {
  bool success = 1; 
  ValidateTokenResponsePayload payload = 2; 
}

message ValidateTokenResponsePayload {
  string id = 1; 
  string role = 2; 
}