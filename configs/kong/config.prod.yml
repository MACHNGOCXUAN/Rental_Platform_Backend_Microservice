  - name: chat-service
    url: http://13.55.31.33:9003
    routes:
      - name: chat-routes
        paths:
          - /api/chat
        strip_path: true  # ← Quan trọng! Giữ nguyên path
        path_handling: v0  # ← Cần thiết cho WebSocket
        preserve_host: false
        protocols:
          - http
          - https
        # Loại bỏ methods restriction để WebSocket upgrade hoạt động
        plugins:
          - name: cors
            config:
              origins:
                - http://localhost:5173
                - http://localhost:8000
                - "*"  # Hoặc thêm origin của mobile app
              methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
              headers:
                - Accept
                - Accept-Version
                - Content-Length
                - Content-MD5
                - Content-Type
                - Date
                - Authorization
                - Upgrade           # ← Thêm cho WebSocket
                - Connection        # ← Thêm cho WebSocket
                - Sec-WebSocket-Key # ← Thêm cho WebSocket
                - Sec-WebSocket-Version
                - Sec-WebSocket-Extensions
              exposed_headers:
                - X-Auth-Token
              credentials: true
              max_age: 3600
          - name: rate-limiting
            config:
              minute: 150
              hour: 1500
              day: 15000
              policy: local
              hide_client_headers: false
              fault_tolerant: true

  - name: notification-service
    url: http://54.206.29.142:9004
    routes:
      - name: notification-routes
        paths:
          - /api/notification
        strip_path: true
        path_handling: v0
        preserve_host: false
