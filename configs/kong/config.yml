          - OPTIONS
        plugins:
          - name: cors
            config:
              origins:
                - http://localhost:3000
                - http://localhost:5173
                - http://localhost:8000
              methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
              headers:
                - Accept
                - Accept-Version
                - Content-Length
                - Content-MD5
                - Content-Type
                - Date
                - Authorization
              exposed_headers:
                - X-Auth-Token
              credentials: true
              max_age: 3600
          - name: rate-limiting
            config:
              minute: 200
              hour: 2000
              day: 20000
              policy: local
              hide_client_headers: false
              fault_tolerant: true
