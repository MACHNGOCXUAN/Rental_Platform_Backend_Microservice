name: Deploy Chat Service

on:
  push:
    branches:
      - main
    paths:
      - 'apps/chat-service/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        run: |
          docker build -t xuanit/chat-service:latest ./apps/chat-service
          docker push xuanit/chat-service:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_CHAT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~

            # check env tồn tại
            if [ ! -f .env ]; then
              echo ".env file not found!"
              exit 1
            fi

            docker pull xuanit/chat-service:latest

            docker stop chat-service || true
            docker rm chat-service || true

            docker run -d \
              --name chat-service \
              -p 9003:9003 \
              --env-file .env \
              xuanit/chat-service:latest