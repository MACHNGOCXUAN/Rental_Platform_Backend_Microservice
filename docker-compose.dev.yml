services:
  kong:
    image: kong:latest
    container_name: kltn-kong
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - ./configs/kong/config.yml:/var/lib/kong/kong.yml:ro
    networks:
      - machngocxuan
    depends_on:
      - user-service
      - property-service
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: ./apps/user-service
      dockerfile: Dockerfile.dev
    container_name: kltn-user-service
    restart: unless-stopped
    ports:
      - "9001:9001"    # HTTP API
      - "50051:50051"  # gRPC
    env_file:
      - ./apps/user-service/.env
    volumes:
      - ./apps/user-service:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run start:dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - machngocxuan

  property-service:
    build:
      context: ./apps/property-service
      dockerfile: Dockerfile.dev
    container_name: kltn-property-service
    restart: unless-stopped
    ports:
      - "9002:9002"    # HTTP API
      - "50052:50052"  # gRPC
    env_file:
      - ./apps/property-service/.env
    volumes:
      - ./apps/property-service:/app
    depends_on:
      # user-service:
      #   condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - machngocxuan

  postgres:
    image: postgres:15-alpine
    container_name: kltn-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sapassword
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - machngocxuan
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kltn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - machngocxuan
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  machngocxuan:
    driver: bridge

volumes:
  postgres_data:
  redis_data: