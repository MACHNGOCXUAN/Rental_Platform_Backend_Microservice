services:
  kong:
    image: kong:latest
    container_name: kltn-kong
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_NGINX_PROXY_CLIENT_MAX_BODY_SIZE: 50m
      KONG_CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - ./configs/kong/config.yml:/var/lib/kong/kong.yml:ro
    networks:
      - realestate
    depends_on:
      estate-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      # contract-service:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  estate-service:
    build:
      context: ./apps/estate-service
      dockerfile: Dockerfile.dev
    container_name: kltn-estate-service
    restart: unless-stopped
    ports:
      - "9001:9001"    # HTTP API
      - "50051:50051"  # gRPC
    env_file:
      - ./apps/estate-service/.env
    volumes:
      - ./apps/estate-service:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run start:dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - realestate
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9001/health || exit 1"]
      interval: 30s # 30s check lại enpoint này 1 lần
      timeout: 10s # nếu trong 10s ko có phản hồi thì coi như thất bại
      retries: 3 # thử lại 3 lần
      start_period: 40s # đợi 40s sau khi container khởi động xong mới bắt đầu check

  contract-service:
    build:
      context: ./apps/contract-service
      dockerfile: Dockerfile.dev
    container_name: kltn-contract-service
    restart: unless-stopped
    ports:
      - "9002:9002"    # HTTP API
      - "50052:50052"  # gRPC
    env_file:
      - ./apps/contract-service/.env
    volumes:
      - ./apps/contract-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - realestate
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9002/health || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s

  chat-service:
    build:
      context: ./apps/chat-service
      dockerfile: Dockerfile.dev
    container_name: kltn-chat-service
    restart: unless-stopped
    ports:
      - "9003:9003"    # HTTP API
      - "50053:50053"  # gRPC
    env_file:
      - ./apps/chat-service/.env
    volumes:
      - ./apps/chat-service:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run start:dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - realestate
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9003/health || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s

  notification-service:
    build:
      context: ./apps/notification-service
      dockerfile: Dockerfile.dev
    container_name: kltn-notification-service
    restart: unless-stopped
    ports:
      - "9004:9004"    # HTTP API
      - "50054:50054"  # gRPC
    env_file:
      - ./apps/notification-service/.env
    volumes:
      - ./apps/notification-service:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npx prisma generate && npm run start:dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - realestate
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9003/health || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile.dev
    container_name: kltn-ai-service
    restart: unless-stopped
    ports:
      - "50055:50055"
    env_file:
      - ./apps/ai-service/.env
    volumes:
      - ./apps/ai-service:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 50055 --reload"
    networks:
      - realestate
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:50055/').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    container_name: kltn-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sapassword
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - realestate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kltn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - realestate
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:6.0
    container_name: kltn-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    command: >
      mongod
      --replSet rs0
      --bind_ip_all
    volumes:
      - mongodb_data:/data/db
    networks:
      - realestate
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: kltn-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP (app connect)
      - "15672:15672"  # Management UI (browser)
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - realestate
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  realestate:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  rabbitmq_data: